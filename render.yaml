services:
  - type: web
    name: ai-agent-analytics
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: MONGO_USER
        sync: false
      - key: MONGO_PASSWORD
        sync: false
      - key: MONGO_HOST
        sync: false
      - key: MONGO_PORT
        value: "27017"
      - key: MONGO_DB
        value: analytics
